<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Transformer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 20px; min-height: 100vh; }
  .container { max-width: 860px; margin: auto; background: white; border-radius: 14px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
  h1 { color: #2d3748; font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: #718096; font-size: 13px; margin-bottom: 28px; }
  .section { margin-bottom: 22px; }
  label { font-weight: bold; font-size: 13px; color: #4a5568; display: block; margin-bottom: 7px; }
  .upload-box { border: 2px dashed #cbd5e0; border-radius: 10px; padding: 18px 14px; width: 100%; font-size: 13px; cursor: pointer; background: #f7fafc; color: #4a5568; transition: border-color .2s; }
  .upload-box:hover { border-color: #4299e1; }

  /* Variations section */
  .var-section { display: none; }
  .var-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .var-header label { margin-bottom: 0; }
  .var-count { font-size: 12px; color: #a0aec0; }
  .tags-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f7fafc; min-height: 52px; }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #ebf8ff; border: 1px solid #bee3f8; color: #2b6cb0;
    padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
  }
  .tag-chip .del-btn {
    background: #fc8181; border: none; color: white; border-radius: 50%;
    width: 18px; height: 18px; cursor: pointer; font-size: 13px; line-height: 18px;
    display: flex; align-items: center; justify-content: center; padding: 0;
    transition: background .15s;
  }
  .tag-chip .del-btn:hover { background: #e53e3e; }
  .hint { font-size: 12px; color: #a0aec0; margin-top: 6px; }

  .btn { background: #4299e1; color: white; border: none; padding: 13px 28px; border-radius: 9px; font-size: 15px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 4px; transition: background .2s; }
  .btn:hover { background: #3182ce; }
  .btn:disabled { background: #a0aec0; cursor: not-allowed; }

  #status { margin-top: 16px; padding: 12px 16px; border-radius: 9px; font-size: 13px; display: none; }
  .status-ok  { background: #c6f6d5; color: #276749; }
  .status-err { background: #fed7d7; color: #9b2c2c; }

  .preview { margin-top: 22px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: #2d3748; color: white; padding: 8px 10px; text-align: left; }
  td { padding: 6px 10px; border-bottom: 1px solid #e2e8f0; }
  tr:hover td { background: #ebf8ff; }
</style>
</head>
<body>
<div class="container">
  <h1>🥟 Menu Transformer</h1>
  <p class="subtitle">Excel upload karo — variations auto-detect honge. Jo nahi chahiye delete karo, phir transform karo.</p>

  <div class="section">
    <label>📂 Excel / CSV File Upload karo</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" class="upload-box">
  </div>

  <div class="section var-section" id="varSection">
    <div class="var-header">
      <label>🏷️ Detected Variations — jo nahi chahiye delete karo</label>
      <span class="var-count" id="varCount"></span>
    </div>
    <div class="tags-grid" id="tagsGrid"></div>
    <p class="hint">Jo variations bachenge unpe hi logic chalega. Baaki items as-is output me aayenge.</p>
  </div>

  <button class="btn" id="processBtn" onclick="processFile()" disabled>⚙️ Transform Karo & Download</button>
  <div id="status"></div>
  <div class="preview" id="previewArea"></div>
</div>

<script>
let tags = [];
let workbookData = null;
let fileType = '';

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  fileType = file.name.endsWith('.csv') ? 'csv' : 'xlsx';
  const reader = new FileReader();
  reader.onload = function(ev) {
    workbookData = ev.target.result;
    const rows = parseFile();
    if (!rows) return;
    autoDetectVariations(rows);
    showStatus('✅ File load ho gayi: ' + file.name + ' (' + (rows.length - 1) + ' rows)', 'ok');
  };
  if (fileType === 'csv') reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
});

function parseFile() {
  try {
    let wb;
    if (fileType === 'csv') {
      wb = XLSX.read(workbookData, { type: 'string' });
    } else {
      wb = XLSX.read(workbookData, { type: 'array' });
    }
    const ws = wb.Sheets[wb.SheetNames[0]];
    return XLSX.utils.sheet_to_json(ws, { header: 1 });
  } catch(e) {
    showStatus('❌ File padhne mein error: ' + e.message, 'err');
    return null;
  }
}

function autoDetectVariations(raw) {
  const header = raw[0];
  const varCol = header.indexOf('Variation_Name');
  if (varCol === -1) { showStatus('❌ Variation_Name column nahi mila', 'err'); return; }

  const seen = new Set();
  raw.slice(1).forEach(row => {
    const val = (row[varCol] || '').toString().trim();
    if (!val) return;
    // Extract filling name (remove bracket part if present)
    const filling = val.replace(/\s*\([^)]*\)/g, '').trim();
    if (filling) seen.add(filling);
    else {
      // bracket-only like "(Half)" — add the bracket content as-is
      const m = val.match(/\(([^)]+)\)/);
      if (m) seen.add(m[1]);
    }
  });

  // Remove duplicates already handled, set unique sorted list
  tags = [...seen].sort((a, b) => a.localeCompare(b));
  renderTags();
  document.getElementById('varSection').style.display = 'block';
  checkReady();
}

function removeTag(val) {
  tags = tags.filter(t => t !== val);
  renderTags();
  checkReady();
}

function renderTags() {
  const grid = document.getElementById('tagsGrid');
  grid.innerHTML = '';
  tags.forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    const safeT = t.replace(/'/g, "\\'");
    chip.innerHTML = `${t} <button class="del-btn" onclick="removeTag('${safeT}')" title="Delete">×</button>`;
    grid.appendChild(chip);
  });
  document.getElementById('varCount').textContent = tags.length + ' variations';
}

function checkReady() {
  document.getElementById('processBtn').disabled = !(workbookData && tags.length > 0);
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.style.display = 'block';
  el.className = type === 'ok' ? 'status-ok' : 'status-err';
  el.innerHTML = msg;
}

function processFile() {
  if (!workbookData || tags.length === 0) return;
  try {
    const raw = parseFile();
    if (!raw) return;
    const header = raw[0];
    const rows = raw.slice(1).map(r => {
      const obj = {};
      header.forEach((h, i) => obj[h] = r[i] ?? '');
      return obj;
    });

    const lowerTags = tags.map(t => t.toLowerCase());

    // Group by consecutive same-name blocks
    const itemBlocks = [];
    rows.forEach(row => {
      const name = (row['Name'] || '').toString();
      const last = itemBlocks[itemBlocks.length - 1];
      if (last && last.name === name) last.rows.push(row);
      else itemBlocks.push({ name, rows: [row] });
    });

    const outputRows = [];
    const bracketRegex = /\(([^)]+)\)/;

    itemBlocks.forEach(block => {
      const itemName = block.name;
      const itemRows = block.rows;
      const baseRow = itemRows.find(r => !r['Variation_Name'] || String(r['Price']) == '0');
      const varRows = itemRows.filter(r => (r['Variation_Name'] || '').toString().trim());
      const hasBracket = varRows.some(r => bracketRegex.test((r['Variation_Name'] || '').toString()));

      if (hasBracket) {
        // LOGIC 1: "Veg (Half)", "Chicken (Full)" type
        const allFillings = [...new Set(varRows.map(r =>
          (r['Variation_Name'] || '').toString().replace(/\s*\([^)]*\)/g, '').trim()
        ).filter(f => f.length > 0))];

        if (allFillings.length === 0) {
          // Only bracket content, no filling — output as-is
          itemRows.forEach(r => outputRows.push({...r}));
          return;
        }

        allFillings.forEach(fillingName => {
          const matchingVars = varRows.filter(r => {
            const fillingOnly = (r['Variation_Name'] || '').toString().replace(/\s*\([^)]*\)/g, '').trim();
            return fillingOnly.toLowerCase() === fillingName.toLowerCase();
          });
          if (matchingVars.length === 0) return;

          const newName = `${fillingName} ${itemName}`;
          const row0 = {...(baseRow || itemRows[0]), Name: newName, Item_Online_DisplayName: newName, Variation_Name: '', Price: 0};
          outputRows.push(row0);

          matchingVars.forEach(mRow => {
            const bm = (mRow['Variation_Name'] || '').toString().match(bracketRegex);
            const varLabel = bm ? bm[1] : mRow['Variation_Name'];
            outputRows.push({...mRow, Name: newName, Item_Online_DisplayName: newName, Variation_Name: varLabel});
          });
        });

      } else {
        // LOGIC 2: "Veg", "Chicken", "Mutton" type (no brackets)
        const anyTagMatch = varRows.some(r =>
          lowerTags.includes((r['Variation_Name'] || '').toString().trim().toLowerCase())
        );

        if (!anyTagMatch) {
          // Already processed or no filling-type variations — output as-is
          itemRows.forEach(r => outputRows.push({...r}));
        } else {
          // Transform all filling variations
          varRows.forEach(vRow => {
            const varName = (vRow['Variation_Name'] || '').toString().trim();
            const newName = `${varName} ${itemName}`;
            outputRows.push({...vRow, Name: newName, Item_Online_DisplayName: newName, Variation_Name: ''});
          });
        }
      }
    });

    if (outputRows.length === 0) {
      showStatus('⚠️ Koi rows nahi mili!', 'err');
      return;
    }

    const newWb = XLSX.utils.book_new();
    const outData = [header, ...outputRows.map(r => header.map(h => r[h] ?? ''))];
    const newWs = XLSX.utils.aoa_to_sheet(outData);
    XLSX.utils.book_append_sheet(newWb, newWs, 'Transformed');
    XLSX.writeFile(newWb, 'transformed_menu.xlsx');

    showStatus(`✅ Done! ${outputRows.length} rows generate hui. File download ho rahi hai.`, 'ok');
    showPreview(header, outputRows.slice(0, 30));

  } catch (err) {
    showStatus('❌ Error: ' + err.message, 'err');
    console.error(err);
  }
}

function showPreview(header, rows) {
  const area = document.getElementById('previewArea');
  const cols = ['Name', 'Variation_Name', 'Price', 'Attributes'].filter(c => header.includes(c));
  let html = `<p style="font-weight:bold;margin:16px 0 8px;font-size:13px;">📋 Preview (pehli 30 rows):</p>
  <table><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
  rows.forEach(r => { html += `<tr>${cols.map(c => `<td>${r[c] ?? ''}</td>`).join('')}</tr>`; });
  html += '</table>';
  area.innerHTML = html;
}
</script>
</body>
</html>
